<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Novo Horizonte</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { --verde:#00a651; --amarelo:#ffd700; --vermelho:#e63946; --azul:#1d3557; --cinza:#f4f1e8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,#1d3557 0%,#2d6a9f 100%); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  #loginScreen { background:white; border-radius:24px; padding:40px 32px; width:min(380px,100%); text-align:center; box-shadow:0 24px 60px rgba(0,0,0,0.4); }
  .logo { font-family:'Bebas Neue',cursive; font-size:2.2rem; color:var(--azul); letter-spacing:3px; }
  .subtitle { font-size:0.72rem; text-transform:uppercase; letter-spacing:3px; color:#aaa; margin-bottom:32px; }
  .lock-icon { font-size:3rem; margin-bottom:16px; }
  #loginScreen input { width:100%; padding:16px; border:2.5px solid #eee; border-radius:14px; font-family:'Nunito',sans-serif; font-size:1.4rem; text-align:center; letter-spacing:8px; outline:none; margin-bottom:14px; transition:border 0.2s; }
  #loginScreen input:focus { border-color:var(--verde); }
  #loginScreen button { width:100%; background:var(--azul); color:white; border:none; padding:16px; border-radius:14px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:900; cursor:pointer; transition:all 0.2s; }
  #loginScreen button:hover { background:var(--verde); transform:translateY(-2px); }
  .login-error { color:var(--vermelho); font-size:0.82rem; margin-top:10px; display:none; font-weight:700; }
  #adminScreen { display:none; width:min(480px,100%); }
  .admin-header { background:white; border-radius:20px; padding:18px 24px; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
  .admin-title { font-family:'Bebas Neue',cursive; font-size:1.5rem; color:var(--azul); letter-spacing:2px; }
  .admin-sub { font-size:0.7rem; color:#aaa; text-transform:uppercase; letter-spacing:1px; }
  .logout-btn { background:#f0f0f0; border:none; padding:8px 16px; border-radius:20px; font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:700; cursor:pointer; color:#888; }
  .status-card { background:white; border-radius:20px; padding:20px 24px; margin-bottom:16px; box-shadow:0 4px 20px rgba(0,0,0,0.15); }
  .status-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:2px; color:#aaa; margin-bottom:8px; }
  .s-wait { color:#f4a261; font-family:'Bebas Neue',cursive; font-size:1.4rem; letter-spacing:2px; display:flex; align-items:center; gap:8px; }
  .s-ok { color:var(--verde); font-family:'Bebas Neue',cursive; font-size:1.4rem; letter-spacing:2px; }
  .s-pend { color:var(--vermelho); font-family:'Bebas Neue',cursive; font-size:1.4rem; letter-spacing:2px; display:flex; align-items:center; gap:8px; }
  .pulse-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; animation:blink 1.2s ease-in-out infinite; }
  .dot-o { background:#f4a261; } .dot-r { background:var(--vermelho); }
  @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }
  #orderCard { background:white; border-radius:20px; overflow:hidden; margin-bottom:16px; box-shadow:0 4px 20px rgba(0,0,0,0.15); display:none; }
  .order-header { background:var(--azul); padding:14px 20px; display:flex; justify-content:space-between; align-items:center; }
  .order-header-title { font-family:'Bebas Neue',cursive; font-size:1.2rem; color:white; letter-spacing:2px; }
  .order-time { font-size:0.75rem; color:rgba(255,255,255,0.6); font-weight:700; }
  .order-item { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid #f5f5f5; }
  .order-item:last-child { border-bottom:none; }
  .item-qty { background:var(--azul); color:white; border-radius:8px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:0.85rem; flex-shrink:0; }
  .item-info { flex:1; }
  .item-name { font-weight:800; font-size:0.95rem; color:var(--azul); line-height:1.2; }
  .item-unit { font-size:0.72rem; color:#aaa; margin-top:2px; }
  .item-price { font-family:'Bebas Neue',cursive; font-size:1.3rem; color:var(--vermelho); }
  .order-total { background:linear-gradient(135deg,var(--azul),#2d6a9f); padding:18px 20px; display:flex; justify-content:space-between; align-items:center; }
  .total-label { color:rgba(255,255,255,0.7); font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
  .total-value { font-family:'Bebas Neue',cursive; font-size:2.4rem; color:var(--amarelo); letter-spacing:1px; }
  .no-orders { background:white; border-radius:20px; padding:40px 20px; text-align:center; margin-bottom:16px; box-shadow:0 4px 20px rgba(0,0,0,0.15); }
  .no-icon { font-size:3rem; margin-bottom:12px; }
  .no-text { color:#aaa; font-weight:700; }
  .confirm-btn { width:100%; background:var(--verde); color:white; border:none; padding:20px; border-radius:16px; font-family:'Nunito',sans-serif; font-size:1.1rem; font-weight:900; cursor:pointer; box-shadow:0 8px 24px rgba(0,166,81,0.5); transition:all 0.2s; margin-bottom:12px; }
  .confirm-btn:hover { transform:translateY(-2px); }
  .confirm-btn:disabled { background:#ccc; box-shadow:none; cursor:not-allowed; transform:none; }
  .confirmed-msg { background:#e8f8f0; border:2px solid var(--verde); border-radius:14px; padding:16px; color:var(--verde); font-weight:700; font-size:0.95rem; text-align:center; display:none; margin-bottom:12px; }
  @keyframes popIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
</style>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
  const firebaseConfig = {
    apiKey: "AIzaSyBKkHx7H1OBD_k8jzrHWEZk",
    authDomain: "mercado-1123b.firebaseapp.com",
    databaseURL: "https://mercado-1123b-default-rtdb.firebaseio.com",
    projectId: "mercado-1123b",
    storageBucket: "mercado-1123b.firebasestorage.app",
    messagingSenderId: "663931630540",
    appId: "1:663931630540:web:da8dc3d57a"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.fbSet = (path, value) => set(ref(db, path), value);
  window.fbListen = (path, cb) => onValue(ref(db, path), snap => cb(snap.val()));
</script>
</head>
<body>

<div id="loginScreen">
  <div class="lock-icon">🔐</div>
  <div class="logo">Novo Horizonte</div>
  <div class="subtitle">Painel do Administrador</div>
  <input type="password" id="codeInput" placeholder="· · · ·" maxlength="6" onkeydown="if(event.key==='Enter') doLogin()">
  <button onclick="doLogin()">ENTRAR</button>
  <div class="login-error" id="loginError">❌ Código incorreto</div>
</div>

<div id="adminScreen">
  <div class="admin-header">
    <div>
      <div class="admin-title">🏪 Novo Horizonte</div>
      <div class="admin-sub">Painel do Administrador</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">⟵ Sair</button>
  </div>

  <div class="status-card">
    <div class="status-label">Status em tempo real</div>
    <div id="statusVal" class="s-wait"><span class="pulse-dot dot-o"></span>Aguardando pedidos...</div>
  </div>

  <div id="noOrders" class="no-orders">
    <div class="no-icon">🛒</div>
    <div class="no-text">Nenhum pedido pendente</div>
  </div>

  <div id="orderCard">
    <div class="order-header">
      <span class="order-header-title">📦 Pedido Recebido</span>
      <span class="order-time" id="orderTime"></span>
    </div>
    <div id="orderItems"></div>
    <div class="order-total">
      <span class="total-label">Total a receber</span>
      <span class="total-value" id="orderTotal"></span>
    </div>
  </div>

  <div class="confirmed-msg" id="confirmedMsg">✅ Pagamento confirmado! Tela do cliente liberada.</div>
  <button class="confirm-btn" id="confirmBtn" onclick="confirmPayment()" disabled>✅ CONFIRMAR PAGAMENTO</button>
</div>

<script>
const ADMIN_CODE = '0407';

function doLogin() {
  if (document.getElementById('codeInput').value === ADMIN_CODE) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    document.getElementById('adminScreen').style.animation = 'popIn 0.3s ease';
    startListening();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('codeInput').value = '';
    document.getElementById('codeInput').style.border = '2.5px solid var(--vermelho)';
    setTimeout(() => {
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('codeInput').style.border = '2.5px solid #eee';
    }, 2000);
  }
}

function doLogout() {
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('codeInput').value = '';
}

function startListening() {
  window.fbListen('pending_order', val => {
    if (val && val !== 'none') {
      try { showOrder(JSON.parse(val)); } catch(e) { showEmpty(); }
    } else { showEmpty(); }
  });
}

function showOrder(order) {
  document.getElementById('noOrders').style.display = 'none';
  document.getElementById('orderCard').style.display = 'block';
  document.getElementById('confirmedMsg').style.display = 'none';
  document.getElementById('confirmBtn').disabled = false;
  document.getElementById('statusVal').className = 's-pend';
  document.getElementById('statusVal').innerHTML = '<span class="pulse-dot dot-r"></span>Pagamento pendente!';
  document.getElementById('orderTime').textContent = order.time || '';
  document.getElementById('orderItems').innerHTML = order.items.map(i => {
    const sub = (parseFloat(i.price.replace(',','.')) * i.qty).toFixed(2).replace('.',',');
    return `<div class="order-item">
      <div class="item-qty">${i.qty}x</div>
      <div class="item-info">
        <div class="item-name">${i.name}</div>
        <div class="item-unit">R$ ${i.price} cada</div>
      </div>
      <div class="item-price">R$ ${sub}</div>
    </div>`;
  }).join('');
  document.getElementById('orderTotal').textContent = `R$ ${order.total}`;
}

function showEmpty() {
  document.getElementById('noOrders').style.display = 'block';
  document.getElementById('orderCard').style.display = 'none';
  document.getElementById('confirmBtn').disabled = true;
  document.getElementById('statusVal').className = 's-ok';
  document.getElementById('statusVal').textContent = '✓ Nenhum pedido pendente';
}

function confirmPayment() {
  window.fbSet('payment_confirmed', 'yes');
  window.fbSet('pending_order', 'none');
  document.getElementById('confirmBtn').disabled = true;
  document.getElementById('confirmedMsg').style.display = 'block';
  document.getElementById('orderCard').style.display = 'none';
  document.getElementById('statusVal').className = 's-ok';
  document.getElementById('statusVal').textContent = '✅ Pago confirmado!';
  setTimeout(() => { showEmpty(); document.getElementById('confirmedMsg').style.display = 'none'; }, 3000);
}

document.getElementById('codeInput').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
