<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novo Horizonte</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #00a651;
    --amarelo: #ffd700;
    --vermelho: #e63946;
    --azul: #1d3557;
    --branco: #fffdf7;
    --cinza: #f4f1e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: var(--branco); overflow-x: hidden; }
  header { background: var(--verde); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,166,81,0.4); }
  .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; }
  .logo { font-family: 'Bebas Neue', cursive; font-size: 2.4rem; color: var(--amarelo); letter-spacing: 2px; text-shadow: 3px 3px 0 rgba(0,0,0,0.2); line-height: 1; }
  .logo span { color: white; display: block; font-size: 0.9rem; letter-spacing: 4px; font-family: 'Nunito', sans-serif; font-weight: 700; }
  .cart-btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5); color: white; padding: 8px 18px; border-radius: 30px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; font-family: 'Nunito', sans-serif; }
  .cart-btn:hover { background: rgba(255,255,255,0.25); }
  .cart-count { background: var(--vermelho); color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 0.72rem; font-weight: 900; display: inline-flex; align-items: center; justify-content: center; }
  .hero { background: linear-gradient(135deg, var(--azul) 0%, #2d6a9f 50%, var(--verde) 100%); padding: 50px 32px; text-align: center; }
  .hero h1 { font-family: 'Bebas Neue', cursive; font-size: 3rem; color: white; letter-spacing: 3px; }
  .hero p { color: rgba(255,255,255,0.85); font-size: 1rem; margin-top: 8px; font-weight: 600; }
  .filters { display: flex; gap: 10px; padding: 20px 32px; background: var(--cinza); overflow-x: auto; border-bottom: 3px solid #e0ddd0; }
  .filter-btn { background: white; border: 2px solid #ddd; padding: 8px 20px; border-radius: 30px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; color: #555; }
  .filter-btn.active, .filter-btn:hover { background: var(--verde); color: white; border-color: var(--verde); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,166,81,0.3); }
  .section-title { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; color: var(--azul); padding: 14px 20px; letter-spacing: 2px; border-left: 6px solid var(--verde); margin: 32px 32px 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 16px 32px 40px; }
  .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: all 0.3s ease; position: relative; animation: fadeUp 0.5s ease both; }
  .card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,0.15); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .card-img-wrap { width: 100%; height: 200px; overflow: hidden; background: var(--cinza); position: relative; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
  .card:hover .card-img-wrap img { transform: scale(1.06); }
  .card-category { position: absolute; top: 10px; left: 10px; background: var(--azul); color: white; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 3px 10px; border-radius: 20px; z-index: 2; }
  .card-body { padding: 14px 16px 18px; }
  .card-brand { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--verde); font-weight: 700; }
  .card-name { font-weight: 900; font-size: 1rem; color: var(--azul); margin: 4px 0; line-height: 1.3; }
  .card-detail { font-size: 0.78rem; color: #888; margin-bottom: 12px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 2px dashed #f0ede0; padding-top: 12px; }
  .price-label { font-size: 0.65rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  .price-value { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; color: var(--vermelho); letter-spacing: 1px; line-height: 1; }
  .add-btn { background: var(--verde); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 12px rgba(0,166,81,0.4); }
  .add-btn:hover { background: var(--azul); transform: scale(1.15); }
  footer { background: var(--azul); color: rgba(255,255,255,0.7); text-align: center; padding: 28px; font-size: 0.85rem; }
  footer strong { color: var(--amarelo); }
  @media (max-width: 600px) {
    .hero h1 { font-size: 2rem; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px 16px; }
    .section-title { margin: 16px; font-size: 1.4rem; }
    .filters { padding: 14px 16px; }
    .header-inner { padding: 12px 16px; }
    .logo { font-size: 1.8rem; }
    .card-img-wrap { height: 150px; }
  }
</style>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBKkHx7H1OBD_k8jzrHWEZk",
    authDomain: "mercado-1123b.firebaseapp.com",
    databaseURL: "https://mercado-1123b-default-rtdb.firebaseio.com",
    projectId: "mercado-1123b",
    storageBucket: "mercado-1123b.firebasestorage.app",
    messagingSenderId: "663931630540",
    appId: "1:663931630540:web:da8dc3d57a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.fbSet = (path, value) => set(ref(db, path), value);
  window.fbListen = (path, cb) => onValue(ref(db, path), snap => cb(snap.val()));
</script>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Novo Horizonte<span>mercadinho</span></div>
    <button class="cart-btn" onclick="openCart()">🛒 Carrinho <span class="cart-count" id="cartCount">0</span></button>
  </div>
</header>

<section class="hero">
  <h1>Produtos Frescos & Preços Honestos</h1>
  <p>Tudo que você precisa, pertinho de você ✨</p>
</section>

<div class="filters">
  <button class="filter-btn active" onclick="filterProducts('todos', this)">🏪 Todos</button>
  <button class="filter-btn" onclick="filterProducts('massas', this)">🍝 Massas</button>
  <button class="filter-btn" onclick="filterProducts('biscoitos', this)">🍘 Biscoitos</button>
  <button class="filter-btn" onclick="filterProducts('conservas', this)">🥫 Conservas</button>
  <button class="filter-btn" onclick="filterProducts('temperos', this)">🧂 Temperos</button>
  <button class="filter-btn" onclick="filterProducts('bebidas', this)">☕ Bebidas</button>
  <button class="filter-btn" onclick="filterProducts('laticinios', this)">🥛 Laticínios</button>
</div>

<div id="productContainer"></div>

<!-- CART MODAL -->
<div id="cartOverlay" onclick="closeCart()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;backdrop-filter:blur(3px);"></div>
<div id="cartDrawer" style="display:none;position:fixed;top:0;right:0;height:100%;width:min(420px,100%);background:white;z-index:1000;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.2);">
  <div style="background:var(--verde);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;">
    <span style="font-family:'Bebas Neue',cursive;font-size:1.8rem;color:white;letter-spacing:2px;">🛒 Meu Carrinho</span>
    <button onclick="closeCart()" style="background:rgba(255,255,255,0.2);border:none;color:white;font-size:1.5rem;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
  </div>
  <div id="cartItems" style="flex:1;overflow-y:auto;padding:16px 24px;"></div>
  <div id="cartFooter" style="padding:20px 24px;border-top:2px solid #f0ede0;background:var(--cinza);"></div>
</div>

<!-- PAYMENT MODAL -->
<div id="payOverlay" onclick="closePayment()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1100;backdrop-filter:blur(4px);"></div>
<div id="payModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1200;background:white;border-radius:24px;width:min(400px,92%);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.3);">
  <div style="background:var(--azul);padding:24px;text-align:center;">
    <div style="font-family:'Bebas Neue',cursive;font-size:2rem;color:white;letter-spacing:2px;">Forma de Pagamento</div>
    <div id="payTotal" style="color:var(--amarelo);font-size:1rem;font-weight:700;margin-top:4px;"></div>
  </div>
  <div style="padding:24px;display:flex;flex-direction:column;gap:14px;">

    <!-- PIX -->
    <button onclick="selectPayment('pix')" id="btn-pix"
      style="display:flex;align-items:center;gap:16px;padding:18px 20px;border:2.5px solid #e0e0e0;border-radius:16px;background:white;cursor:pointer;transition:all 0.2s;text-align:left;font-family:'Nunito',sans-serif;">
      <div style="width:52px;height:52px;background:#32bcad;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
          <path d="M8 16L16 8L24 16L16 24Z" fill="white" stroke="white" stroke-width="1"/>
          <path d="M16 8L20 12L16 16L12 12Z" fill="#32bcad"/>
          <path d="M16 16L20 20L16 24L12 20Z" fill="#32bcad"/>
        </svg>
      </div>
      <div>
        <div style="font-weight:900;font-size:1.05rem;color:var(--azul);">PIX</div>
        <div style="font-size:0.78rem;color:#888;margin-top:2px;">Pagamento instantâneo · Aprovação imediata</div>
      </div>
      <div id="check-pix" style="margin-left:auto;display:none;color:var(--verde);font-size:1.4rem;">✓</div>
    </button>

    <button onclick="confirmPayment()"
      style="width:100%;background:var(--verde);color:white;border:none;padding:16px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;margin-top:6px;box-shadow:0 6px 20px rgba(0,166,81,0.35);letter-spacing:1px;">
      CONFIRMAR PAGAMENTO
    </button>
    <button onclick="closePayment()"
      style="background:none;border:none;color:#bbb;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif;padding:4px;">
      ← Voltar ao carrinho
    </button>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div id="successModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1300;background:white;border-radius:24px;width:min(360px,90%);padding:40px 32px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.3);">
  <div style="font-size:4rem;margin-bottom:12px;">⏳</div>
  <div style="font-family:'Bebas Neue',cursive;font-size:2rem;color:var(--verde);letter-spacing:2px;">Aguarde a Confirmação do Pagamento</div>
  <div id="successMsg" style="color:#666;font-size:0.95rem;margin:12px 0 24px;line-height:1.5;"></div>
  <div id="waitingSpinner" style="margin:16px 0;"><div style="width:40px;height:40px;border:4px solid #eee;border-top:4px solid var(--verde);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;"></div><p style="color:#aaa;font-size:0.8rem;margin-top:10px;">Aguardando confirmação...</p></div>


</div>
<div id="successOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1250;cursor:not-allowed;"></div>

<footer>
  <p>© 2025 <strong>Novo Horizonte</strong> · Feito com ❤️ para nossa comunidade</p>
</footer>

const catLabels = {
  massas:"🍝 Massas", biscoitos:"🍘 Biscoitos", conservas:"🥫 Conservas",
  temperos:"🧂 Temperos", bebidas:"☕ Bebidas & Infusões", laticinios:"🥛 Laticínios & Cremes"
};

let cartItems = []; // {product, qty}

function getCartProduct(name) {
  return cartItems.find(i => i.product.name === name);
}

function openCart() {
  document.getElementById('cartOverlay').style.display = 'block';
  const drawer = document.getElementById('cartDrawer');
  drawer.style.display = 'flex';
  drawer.style.animation = 'slideInRight 0.3s ease';
  renderCart();
}

function closeCart() {
  document.getElementById('cartOverlay').style.display = 'none';
  document.getElementById('cartDrawer').style.display = 'none';
}

function renderCart() {
  const container = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');

  if (!cartItems.length) {
    container.innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:#aaa;">
        <div style="font-size:4rem;margin-bottom:16px;">🛒</div>
        <div style="font-size:1.1rem;font-weight:700;">Carrinho vazio</div>
        <div style="font-size:0.85rem;margin-top:8px;">Adicione produtos para começar!</div>
      </div>`;
    footer.innerHTML = '';
    return;
  }

  container.innerHTML = cartItems.map(item => {
    const priceNum = parseFloat(item.product.price.replace(',', '.'));
    const subtotal = (priceNum * item.qty).toFixed(2).replace('.', ',');
    return `
    <div style="display:flex;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid #f0ede0;">
      <img src="${item.product.img}" alt="${item.product.name}"
        style="width:64px;height:64px;object-fit:cover;border-radius:10px;flex-shrink:0;border:2px solid #eee;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:0.68rem;color:var(--verde);font-weight:700;text-transform:uppercase;letter-spacing:1px;">${item.product.brand}</div>
        <div style="font-weight:800;font-size:0.9rem;color:var(--azul);line-height:1.2;">${item.product.name}</div>
        <div style="font-size:0.75rem;color:#999;">${item.product.detail}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
        <div style="font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--vermelho);">R$ ${subtotal}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button onclick="changeQty('${item.product.name}',-1)"
            style="width:26px;height:26px;border-radius:50%;border:2px solid #ddd;background:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:#555;line-height:1;">−</button>
          <span style="font-weight:900;font-size:0.95rem;min-width:18px;text-align:center;">${item.qty}</span>
          <button onclick="changeQty('${item.product.name}',1)"
            style="width:26px;height:26px;border-radius:50%;border:none;background:var(--verde);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:white;line-height:1;">+</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const total = cartItems.reduce((sum, i) => {
    return sum + parseFloat(i.product.price.replace(',', '.')) * i.qty;
  }, 0).toFixed(2).replace('.', ',');

  const totalQty = cartItems.reduce((s, i) => s + i.qty, 0);

  footer.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span style="font-weight:700;color:#555;">${totalQty} ${totalQty===1?'item':'itens'}</span>
      <div>
        <span style="font-size:0.8rem;color:#999;margin-right:6px;">TOTAL</span>
        <span style="font-family:'Bebas Neue',cursive;font-size:2rem;color:var(--azul);">R$ ${total}</span>
      </div>
    </div>
    <button onclick="openPayment()"
      style="width:100%;background:var(--verde);color:white;border:none;padding:16px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;letter-spacing:1px;transition:all 0.2s;box-shadow:0 6px 20px rgba(0,166,81,0.35);">
      ✅ FINALIZAR PEDIDO
    </button>
    <button onclick="clearCart()"
      style="width:100%;background:none;border:none;color:#bbb;font-size:0.8rem;font-weight:600;margin-top:10px;cursor:pointer;font-family:'Nunito',sans-serif;">
      🗑 Limpar carrinho
    </button>`;
}

function changeQty(name, delta) {
  const idx = cartItems.findIndex(i => i.product.name === name);
  if (idx === -1) return;
  cartItems[idx].qty += delta;
  if (cartItems[idx].qty <= 0) cartItems.splice(idx, 1);
  updateCartCount();
  renderCart();
}

function clearCart() {
  cartItems = [];
  updateCartCount();
  renderCart();
}

function updateCartCount() {
  const total = cartItems.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartCount').textContent = total;
}

function renderProducts(filter = 'todos') {
  const container = document.getElementById('productContainer');
  container.innerHTML = '';
  const cats = filter === 'todos' ? [...new Set(products.map(p => p.category))] : [filter];
  cats.forEach(cat => {
    const items = products.filter(p => p.category === cat);
    if (!items.length) return;
    const title = document.createElement('h2');
    title.className = 'section-title';
    title.textContent = catLabels[cat];
    container.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'grid';
    items.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.07}s`;
      card.innerHTML = `
        <div class="card-img-wrap">
          <span class="card-category">${p.category}</span>
          <img src="${p.img}" alt="${p.name}" loading="lazy">
        </div>
        <div class="card-body">
          <div class="card-brand">${p.brand}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-detail">${p.detail}</div>
          <div class="card-footer">
            <div>
              <div class="price-label">preço</div>
              <div class="price-value">R$ ${p.price}</div>
            </div>
            <button class="add-btn" onclick="addToCart(this, '${p.name}')">+</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}

function filterProducts(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat);
}

function addToCart(btn, productName) {
  const p = products.find(x => x.name === productName);
  if (!p) return;
  const existing = cartItems.find(i => i.product.name === productName);
  if (existing) existing.qty++;
  else cartItems.push({ product: p, qty: 1 });
  updateCartCount();
  btn.textContent = '✓';
  btn.style.background = '#1d3557';
  setTimeout(() => { btn.textContent = '+'; btn.style.background = ''; }, 700);
}

let selectedPayment = null;

function openPayment() {
  if (!cartItems.length) return;
  selectedPayment = null;
  ['pix'].forEach(m => {
    document.getElementById('btn-'+m).style.border = '2.5px solid #e0e0e0';
    document.getElementById('btn-'+m).style.background = 'white';
    document.getElementById('check-'+m).style.display = 'none';
  });
  const total = cartItems.reduce((s,i) => s + parseFloat(i.product.price.replace(',','.')) * i.qty, 0).toFixed(2).replace('.',',');
  document.getElementById('payTotal').textContent = `Total: R$ ${total}`;
  document.getElementById('payOverlay').style.display = 'block';
  document.getElementById('payModal').style.display = 'block';
  document.getElementById('payModal').style.animation = 'popIn 0.3s ease';
}

function closePayment() {
  document.getElementById('payOverlay').style.display = 'none';
  document.getElementById('payModal').style.display = 'none';
}

function selectPayment(method) {
  selectedPayment = method;
  ['pix'].forEach(m => {
    const btn = document.getElementById('btn-'+m);
    const chk = document.getElementById('check-'+m);
    if (m === method) {
      btn.style.border = '2.5px solid var(--verde)';
      btn.style.background = '#f0faf4';
      chk.style.display = 'block';
    } else {
      btn.style.border = '2.5px solid #e0e0e0';
      btn.style.background = 'white';
      chk.style.display = 'none';
    }
  });
}

function confirmPayment() {
  if (!selectedPayment) {
    alert('Selecione uma forma de pagamento!');
    return;
  }
  const total = cartItems.reduce((s,i) => s + parseFloat(i.product.price.replace(',','.')) * i.qty, 0).toFixed(2).replace('.',',');
  const msgs = {
    pix: `Pague <strong>R$ ${total}</strong> via PIX.<br><br>📱 Chave PIX (CPF):<br><strong style="font-size:1.1rem;letter-spacing:1px;">243.051.568-73</strong><br><br>👤 Favorecido: <strong>Jose Luis Soria F.</strong><br><br>⏳ Aguarde a confirmação do pagamento...`
  };
  closePayment();
  document.getElementById('successMsg').innerHTML = msgs[selectedPayment];
  document.getElementById('successOverlay').style.display = 'block';
  document.getElementById('successModal').style.display = 'block';
  document.getElementById('successModal').style.animation = 'popIn 0.3s ease';
  // Save order for admin
  try {
    const orderData = {
      items: cartItems.map(i => ({ name: i.product.name, qty: i.qty, price: i.product.price })),
      total: total,
      time: new Date().toLocaleTimeString('pt-BR')
    };
    window.fbSet('pending_order', JSON.stringify(orderData));
    window.fbSet('payment_confirmed', 'no');
  } catch(e) {}
  startPolling();
}

// Listen Firebase for admin confirmation
let unsubscribe = null;

function startPolling() {
  unsubscribe = window.fbListen('payment_confirmed', (val) => {
    if (val === 'yes') {
      window.fbSet('payment_confirmed', 'no');
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      finishOrder();
    }
  });
}

function stopPolling() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
}

function finishOrder() {
  stopPolling();
  document.getElementById('successOverlay').style.display = 'none';
  document.getElementById('successModal').style.display = 'none';
  cartItems = [];
  updateCartCount();
  closeCart();
}

const style = document.createElement('style');
style.textContent = `
  @keyframes slideInRight { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
  @keyframes popIn { from { transform: translate(-50%,-50%) scale(0.85); opacity:0; } to { transform: translate(-50%,-50%) scale(1); opacity:1; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
`;
document.head.appendChild(style);

renderProducts();
</script>
